<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Stream Overlay - Dwa Wiersze</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="overlay-wrapper">
        <div class="items">
            <!-- PRZYKŁADOWY BLOK 1 (np. Róża) -->
            <div class="event-border">
                <div class="event">
                    <div class="function-name">kriss8837</div>
                    <div class="trigger-img-wrapper">
                        <img src="https://p16-webcast.tiktokcdn-sg.com/img/maliva/webcast-normal/image_d5006b3d16068b68c01b3f3d9a077f10~100x100.png" class="gift-icon">
                        <div class="likes-number">Róża</div>
                    </div>
                    <div class="function-image-wrapper">
                        <img src="https://p16-webcast.tiktokcdn.com/img/maliva/webcast-normal/image_126920b8d53b57c86701554b1a87e289~100x100.png" class="function-icon">
                    </div>
                    <div class="coin-number">10</div>
                    <div class="repetition">x1</div>
                </div>
            </div>

             <!-- PRZYKŁADOWY BLOK 2 (np. Lwia) -->
            <div class="event-border">
                <div class="event">
                     <div class="function-name">streamer_xyz</div>

                        <div class="likes-number">Lwia</div>
                    </div>
                    <div class="function-image-wrapper">

                    </div>
                    <div class="coin-number">100</div>
                    <div class="repetition">x2</div>
                </div>
            </div>
            
            <!-- PRZYKŁADOWY BLOK 3 (np. Przesyłka) -->
            <div class="event-border">
                <div class="event">
                    <div class="function-name">fan_tiktioka</div>
                    <div class="trigger-img-wrapper">
                        <img src="https://p16-webcast.tiktokcdn.com/img/maliva/webcast-normal/image_a602189c60683d667c01b5d163e0b8b1~100x100.png" class="gift-icon">
                        <div class="likes-number">Przesyłka</div>
                    </div>
                    <div class="function-image-wrapper">

                    </div>
                    <div class="coin-number">100</div>
                    <div class="repetition">x5</div>
                </div>
            </div>
            
            <!-- PRZYKŁADOWY BLOK 4 (np. Cukierki) -->
             <div class="event-border">
                <div class="event">
                    <div class="function-name">tiktok_user</div>
                     <div class="trigger-img-wrapper">
                        <img src="https://p16-webcast.tiktokcdn.com/img/maliva/webcast-normal/image_63c4a492d99c8d797c01b5d163e0b8b1~100x100.png" class="gift-icon">

                    <div class="function-image-wrapper">

        </div>

</body>
</html>
